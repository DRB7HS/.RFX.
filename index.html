<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFX</title>
    <meta property="og:title" content="RFX">
    <meta property="og:description" content="RFX ON TOP + موثوق">
    <meta property="og:image" content="https://i.ibb.co/k2TnxCGj/IMG-3295.webp">
    <meta property="og:type" content="website">
    
    <meta name="theme-color" content="#bd1e2b">
   
    <link rel="icon" type="image/webp" href="https://i.ibb.co/6RSVg2Y3/9199-D94-D-05-CB-44-EB-979-D-5-A9-E598-B4-BE1.png">
    <link rel="shortcut icon" href="https://i.ibb.co/6RSVg2Y3/9199-D94-D-05-CB-44-EB-979-D-5-A9-E598-B4-BE1.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/6RSVg2Y3/9199-D94-D-05-CB-44-EB-979-D-5-A9-E598-B4-BE1.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #0b0b0b;
        }


        .intro-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .intro-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }


        .main-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/6RSVg2Y3/9199-D94-D-05-CB-44-EB-979-D-5-A9-E598-B4-BE1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }


        .side-bar-line {
            position: fixed;
            top: 0;
            right: 0;
            width: 70px;
            height: 100%;
            background: rgba(15, 15, 15, 0.95);
            border-left: 1px solid rgba(212, 175, 55, 0.2);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #d4af37; 
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s, color 0.3s;
            margin-bottom: 40px;
        }

        .menu-btn:hover {
            transform: scale(1.1);
            color: #ffffff;
        }

  
        .gold-letters {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            font-size: 28px;
            font-weight: 900;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
            user-select: none;
            margin-top: 20px;
        }


        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 260px;
            height: 100%;
            background: rgba(10, 10, 10, 0.98);
            border-left: 2px solid #d4af37;
            z-index: 9;
            transition: right 0.4s ease;
            padding: 80px 20px 20px 20px;
        }

        .side-menu.active {
            right: 70px; 
        }

        .menu-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 10px;
        }

        .side-menu .menu-link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #fff;
            text-decoration: none;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
        }


        .btn-download-site {
            background-color: #0056b3;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.4);
        }
        .btn-download-site:hover {
            background-color: #004085;
            transform: scale(1.02);
        }

        .btn-discord {
            background-color: #5865F2;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }
        .btn-discord:hover {
            background-color: #4752C4;
            transform: scale(1.02);
        }


        .page-container {
            margin-right: 70px; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page {
            display: none;
            width: 100%;
            max-width: 750px;
            animation: fadeIn 0.5s ease forwards;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    
        .luxury-box {
            position: relative;
            width: 100%;
            background-image: linear-gradient(rgba(15, 15, 15, 0.8), rgba(15, 15, 15, 0.8)), url('https://i.ibb.co/k2TnxCGj/IMG-3295.webp');
            background-size: cover;
            background-position: center;
            border: 2px solid rgba(212, 175, 55, 0.25);
            border-radius: 24px;
            padding: 50px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            backdrop-filter: blur(8px);
        }


        .android-gate-btn {
            background: rgba(20, 20, 20, 0.85);
            border: 2px solid #34a853; 
            padding: 35px 20px;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            display: block;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
        }

        .android-gate-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(52, 168, 83, 0.3);
            border-color: #d4af37;
        }

        .android-gate-btn i {
            font-size: 60px;
            color: #34a853;
            margin-bottom: 20px;
        }

        .android-gate-btn p {
            color: #ffffff;
            font-size: 18px;
            line-height: 1.7;
            font-weight: bold;
        }

        .box-title {
            color: #ffffff;
            font-size: 32px;
            margin-bottom: 30px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.7);
            font-weight: 800;
        }


        .status-badge-premium {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(10, 30, 15, 0.85);
            border: 2px solid #2ecc71;
            padding: 8px 18px;
            border-radius: 30px;
            color: #2ecc71;
            font-weight: 900;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
            animation: badgePulse 2s infinite ease-in-out;
        }


        @keyframes badgePulse {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(46, 204, 113, 0.7); border-color: #27ae60; }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
        }

        .status-badge-premium .animated-circle {
            width: 100%;
            height: 100%;
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            position: relative;
        }

        .status-badge-premium .animated-circle::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background-color: #2ecc71;
            animation: ripple 1.5s infinite ease-out;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }


        .hack-img-animated {
            width: 200px;
            height: auto;
            margin: 30px auto;
            display: block;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
            animation: slowFloatAndTilt 4.5s ease-in-out infinite;
        }

        @keyframes slowFloatAndTilt {
            0% { transform: rotate(8deg) translateY(0px); }
            50% { transform: rotate(8deg) translateY(-15px); }
            100% { transform: rotate(8deg) translateY(0px); }
        }


        .action-btn-purple {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 360px;
            padding: 18px 32px;
            margin: 20px auto;
            background: linear-gradient(135deg, #6f42c1, #522793); 
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            overflow: hidden; 
            box-shadow: 0 6px 20px rgba(111, 66, 193, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .action-btn-purple:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(111, 66, 193, 0.7);
        }

       
        .action-btn-purple::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 80%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.45),
                transparent
            );
            transform: skewX(-35deg);
            animation: dynamicShine 2.8s infinite ease-in-out;
        }

        @keyframes dynamicShine {
            0% { left: -150%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        .back-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.25);
            color: #bbb;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
            font-weight: bold;
        }
        .back-btn:hover {
            color: #fff;
            border-color: #fff;
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>


    <div class="intro-video-container" id="introContainer">
        <video id="introVideo" autoplay muted playsinline>
            <source src="https://files.catbox.moe/l77jdp.mov" type="video/mp4">
            <source src="https://files.catbox.moe/l77jdp.mov" type="video/quicktime">
            
        </video>
    </div>

    <div class="main-background"></div>
    <div class="overlay"></div>


    <div class="side-bar-line">
        <button class="menu-btn" onclick="toggleMenu()">

        </button>
        
        <div class="gold-letters">
            <span>R</span>

            <span>X</span>

    </div>

    
    <div class="side-menu" id="sideMenu">
        <div class="menu-title">هاكات الاندرويد</div>
        
      
        <a href="https://drb7hs.github.io/.RFX./RFX.mobileconfig" class="menu-link-btn btn-download-site">
            <i class="fas fa-download"></i>
            تنزيل الموقع
        </a>
        
       
        <a href="https://discord.gg/rfx" target="_blank" class="menu-link-btn btn-discord">
            <i class="fab fa-discord"></i>
            دخول الديسكورد
        </a>
    </div>

    
    <div class="page-container">

        <div id="hacksPage" class="page">
            <div class="luxury-box">

                <h2 class="box-title">Delta - دلـتـا</h2>

               
                <img src="https://i.postimg.cc/JhrQQYV2/E367-C7-D2-4750-4524-ADD5-B9-A8-DA953734.png" alt="Delta Logo" class="hack-img-animated">

                
                <a href="https://release-assets.githubusercontent.com/github-production-release-asset/689989455/5bd2396f-2de2-4865-8ad7-192ec0b74314?sp=r&sv=2018-11-09&sr=b&spr=https&se=2026-07-04T01%3A06%3A37Z&rscd=attachment%3B+filename%3DDelta-2.727.1199.apk&rsct=application%2Fvnd.android.package-archive&skoid=96c2d410-5711-43a1-aedd-ab1947aa7ab0&sktid=398a6654-997b-47e9-b12b-9515b896b4de&skt=2026-07-04T00%3A06%3A28Z&ske=2026-07-04T01%3A06%3A37Z&sks=b&skv=2018-11-09&sig=y5yylzSuSJFpCdS8G4cvhJlzKb0CRDWROS5JtV0tI84%3D&jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmVsZWFzZS1hc3NldHMuZ2l0aHVidXNlcmNvbnRlbnQuY29tIiwia2V5Ijoia2V5MSIsImV4cCI6MTc4MzEyNzQ3NSwibmJmIjoxNzgzMTIzODc1LCJwYXRoIjoicmVsZWFzZWFzc2V0cHJvZHVjdGlvbi5ibG9iLmNvcmUud2luZG93cy5uZXQifQ.RCcJWoGiH0PMCWuPzzZy-EUBC2PeRI6VVa4uLwmaucU&response-content-disposition=attachment%3B%20filename%3DDelta-2.727.1199.apk&response-content-type=application%2Fvnd.android.package-archive" class="action-btn-purple">

                <button class="back-btn" onclick="showPage('home')">
                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </button>
            </div>
        </div>

    </div>

    <script>
        
        const video = document.getElementById('introVideo');
        const introContainer = document.getElementById('introContainer');
        
        video.addEventListener('ended', function() {
            introContainer.style.opacity = '0';
            introContainer.style.visibility = 'hidden';
            setTimeout(() => {
                introContainer.style.display = 'none';
            }, 800);
        });

        
        window.addEventListener('DOMContentLoaded', () => {
            video.play().catch(error => {
                console.log(".");
            });
        });

        
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            menu.classList.toggle('active');
        }

        
        function showPage(pageId) {
            document.getElementById('homePage').classList.remove('active');
            document.getElementById('hacksPage').classList.remove('active');
            document.getElementById('sideMenu').classList.remove('active');

            if(pageId === 'home') {
                document.getElementById('homePage').classList.add('active');
            } else if(pageId === 'hacks') {
                document.getElementById('hacksPage').classList.add('active');
            }
        }

       
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('sideMenu');
            const menuBtn = document.querySelector('.menu-btn');
            if (!menu.contains(event.target) && !menuBtn.contains(event.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
