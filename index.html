<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFX</title>
    <meta property="og:title" content="RFX">
    <meta property="og:description" content="RFX ON TOP + موثوق">
    <meta property="og:image" content="https://i.ibb.co/k2TnxCGj/IMG-3295.webp">
    <meta property="og:type" content="website">
    
    <meta name="theme-color" content="#bd1e2b">
   
    <link rel="icon" type="image/webp" href="https://i.ibb.co/6RSVg2Y3/9199-D94-D-05-CB-44-EB-979-D-5-A9-E598-B4-BE1.png">
    <link rel="shortcut icon" href="https://i.ibb.co/6RSVg2Y3/9199-D94-D-05-CB-44-EB-979-D-5-A9-E598-B4-BE1.png">
   
    <link rel="apple-touch-icon" href="https://i.ibb.co/6RSVg2Y3/9199-D94-D-05-CB-44-EB-979-D-5-A9-E598-B4-BE1.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #0b0b0b;
        }

        
        .main-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/6RSVg2Y3/9199-D94-D-05-CB-44-EB-979-D-5-A9-E598-B4-BE1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        
        .side-bar-line {
            position: fixed;
            top: 0;
            right: 0;
            width: 70px;
            height: 100%;
            background: rgba(15, 15, 15, 0.95);
            border-left: 1px solid rgba(212, 175, 55, 0.2);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        
        .menu-btn {
            background: none;
            border: none;
            color: #d4af37; 
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s, color 0.3s;
        }

        .menu-btn:hover {
            transform: scale(1.1);
            color: #ffffff;
        }

        
        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 250px;
            height: 100%;
            background: rgba(10, 10, 10, 0.98);
            border-left: 2px solid #d4af37;
            z-index: 9;
            transition: right 0.4s ease;
            padding: 80px 20px 20px 20px;
        }

        .side-menu.active {
            right: 70px; 
        }

        .side-menu a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .side-menu a:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #d4af37;
            color: #d4af37;
        }

        
        .page-container {
            margin-right: 70px; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page {
            display: none;
            width: 100%;
            max-width: 700px;
            animation: fadeIn 0.5s ease forwards;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        
        .luxury-box {
            position: relative;
            width: 100%;
            background-image: linear-gradient(rgba(15, 15, 15, 0.85), rgba(15, 15, 15, 0.85)), url('https://i.ibb.co/k2TnxCGj/IMG-3295.webp');
            background-size: cover;
            background-position: center;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        
        .iphone-gate-btn {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #d4af37;
            padding: 30px;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            display: block;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .iphone-gate-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .iphone-gate-btn i {
            font-size: 50px;
            color: #d4af37;
            margin-bottom: 15px;
        }

        .iphone-gate-btn p {
            color: #e0e0e0;
            font-size: 18px;
            line-height: 1.6;
            font-weight: bold;
        }

        
        .box-title {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-weight: 800;
            letter-spacing: 1px;
        }

        
        .status-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #2ecc71;
            padding: 8px 16px;
            border-radius: 30px;
            color: #2ecc71;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        
        .status-badge i {
            font-size: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        
        .hack-img {
            width: 180px;
            height: auto;
            margin: 20px auto;
            display: block;
            transform: rotate(7deg); 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: floatAndTilt 4s ease-in-out infinite;
        }

        @keyframes floatAndTilt {
            0% { transform: rotate(7deg) translateY(0px); }
            50% { transform: rotate(7deg) translateY(-12px); }
            100% { transform: rotate(7deg) translateY(0px); }
        }

        
        .action-btn {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 340px;
            padding: 16px 32px;
            margin: 15px auto;
            background-color: #bd1e2b; 
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(189, 30, 43, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .action-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(189, 30, 43, 0.6);
        }

        
        .action-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 120%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transform: skewX(-30deg);
            animation: shine 3.5s infinite ease-in-out;
        }

        @keyframes shine {
            0% { left: -150%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        
        .back-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: #aaa;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .back-btn:hover {
            color: #fff;
            border-color: #fff;
      }
        
</style>
</head>
<body>

   
    <div class="main-background"></div>
    <div class="overlay"></div>

    
    <div class="side-bar-line">
        <button class="menu-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    
    <div class="side-menu" id="sideMenu">
        <a href="#" onclick="showPage('home')">الرئيسية</a>
        <a href="#" onclick="showPage('hacks')">هاكات الآيفون</a>
        <a href="https://drb7hs.github.io/.RFX./RFX.mobileconfig" target="_blank">تنزيل الموقع </a>
    </div>

    
    <div class="page-container">

        
        <div id="homePage" class="page active">
            <div class="luxury-box">
                <button class="iphone-gate-btn" onclick="showPage('hacks')">
                    <i class="fas fa-mobile-alt"></i>
                    <p>هاكات الآيفون مثل دلتا و غيرها من الهاكات <br> <span style="color: #d4af37;">+ iOS فقط</span></p>
                </button>
            </div>
        </div>

        
        <div id="hacksPage" class="page">
            <div class="luxury-box">
                
                <div class="status-badge">
                    <i class="fas fa-circle"></i>
                    شغال
                </div>

                <h2 class="box-title">Delta - دلـتـا</h2>

                
                <img src="https://i.postimg.cc/JhrQQYV2/E367-C7-D2-4750-4524-ADD5-B9-A8-DA953734.png" alt="Delta Logo" class="hack-img">

                
                <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="action-btn">
                    Delta Install
                </a>

                <a href="itms-services://?action=download-manifest&url=https://www.installonair.com/storage/ipaz/x5eYMW/x5eYMW.plist" class="action-btn">
                    Delta VNG Install
                </a>

                <br>
                <button class="back-btn" onclick="showPage('home')">
                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </button>
            </div>
        </div>

    </div>

    
    <script>
        
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            menu.classList.toggle('active');
        }

        
        function showPage(pageId) {
            
            document.getElementById('homePage').classList.remove('active');
            document.getElementById('hacksPage').classList.remove('active');
            
            
            document.getElementById('sideMenu').classList.remove('active');

            
            if(pageId === 'home') {
                document.getElementById('homePage').classList.add('active');
            } else if(pageId === 'hacks') {
                document.getElementById('hacksPage').classList.add('active');
            }
        }

       
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('sideMenu');
            const menuBtn = document.querySelector('.menu-btn');
            if (!menu.contains(event.target) && !menuBtn.contains(event.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
